services:
  jenkins:
    image: jenkins/jenkins:lts-jdk17     # official Jenkins LTS, supports the Pi's arm64 chip
    container_name: jenkins
    restart: unless-stopped              # comes back automatically after a reboot
    environment:
      JAVA_OPTS: "-Xmx1024m"             # cap Jenkins' memory at ~1GB so the Pi stays comfortable
    ports:
      - "8080:8080"                      # the Jenkins web interface, reachable at http://<pi-ip>:8080
    volumes:
      - jenkins_home:/var/jenkins_home   # keeps all Jenkins config/jobs even if the container is recreated

volumes:
  jenkins_home:
