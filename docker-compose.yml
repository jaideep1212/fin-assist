services:
  jenkins:
    build: .                             # build the custom image from the Dockerfile in this folder
    image: jenkins-docker:lts-jdk17      # name to tag the built image
    container_name: jenkins
    restart: unless-stopped
    environment:
      JAVA_OPTS: "-Xmx1024m"
    ports:
      - "8080:8080"
    group_add:
      - "984"  # add the docker group to the jenkins container so it can talk to the host's docker
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock   # lets Jenkins talk to the Pi's Docker

volumes:
  jenkins_home:
