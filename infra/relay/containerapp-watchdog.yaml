# Example Container App: the watchdog + azbridge sidecar in one replica.
# Both containers share localhost, so the watchdog reaches Postgres at
# 127.0.0.1:5432 (the sidecar's local forwarder).
#
#   az containerapp create -g rg-financial-rec -n financial-watchdog \
#     --environment cae-financial --yaml containerapp-watchdog.yaml
#
# The API app is the same idea: swap the app container's command for uvicorn
# and add ingress. Both apps that touch the DB carry their own azbridge sidecar.

properties:
  managedEnvironmentId: /subscriptions/<SUBSCRIPTION_ID>/resourcegroups/fin-assist-rg/providers/Microsoft.App/managedEnvironments/fin-assist-cae
  configuration:
    secrets:
      - name: db-url
        value: "postgresql://<PG_USER_PI>:<PG_PASSWORD_PI>@127.0.0.1:5432/<PG_DB_PI>"
      - name: relay-send-connstr
        value: <AZURE_SEND_CONN_STR>
      - name: acr-password
        value: <ACR_PASSWORD>
      - name: blob-conn-str
        value: <BLOB_CONN_STR>
    registries:
      - server: <ACR_NAME>.azurecr.io
        username: <ACR_NAME>
        passwordSecretRef: acr-password
  template:
    scale:
      minReplicas: 1        # watchdog is always-on so it can poll every minute
      maxReplicas: 1
    containers:
      - name: watchdog
        image: <ACR_NAME>.azurecr.io/finassist:v1
        command: ["python", "run_watchdog.py"]
        resources: { cpu: 0.25, memory: 0.5Gi }
        env:
          - name: DATABASE_URL
            secretRef: db-url
          - name: WATCHDOG_TZ
            value: "UTC"
          - name: WATCHDOG_DAY_START
            value: "16:00"
          - name: SINK
            value: "blob"
          - name: BLOB_CONN_STR
            secretRef: blob-conn-str
      - name: azbridge
        image: <ACR_NAME>.azurecr.io/azbridge-sidecar:v1
        resources: { cpu: 0.25, memory: 0.5Gi }
        env:
          - name: RELAY_NAMESPACE
            value: "fin-assist-relay"
          - name: RELAY_SEND_CONNSTR
            secretRef: <AZURE_SEND_CONN_STR>